// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.13.0'
        classpath 'com.google.gms:google-services:4.4.4'

        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

apply from: "variables.gradle"

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // O projeto vive dentro do OneDrive, que fica sincronizando os
    // arquivos de build e trava o empacotamento ("Failed to delete
    // some children"). Mandar TODO o build pra fora do OneDrive
    // (AppData\Local) resolve de vez -- o APK sai lá em
    // .../DesbravaBuild/app/outputs/apk/debug/app-debug.apk
    buildDir = "${System.env.LOCALAPPDATA}/DesbravaBuild/${project.name}"
}

task clean(type: Delete) {
    delete rootProject.buildDir
}
