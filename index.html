<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Raspadinha - Rio de Janeiro</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header>
    <h1>🗺️ Mapa Raspadinha - Estado do Rio de Janeiro</h1>
    <p id="progresso">Visitados: <span id="contador">0</span> / <span id="total">3</span></p>
  </header>

  <main>
    <!--
      SVG DE TESTE (Etapa 1):
      3 municípios simplificados como formas geométricas simples,
      apenas para validar a lógica de clique/raspagem/localStorage.
      Na Etapa 2 substituiremos por um SVG real vindo do IBGE.

      IMPORTANTE: cada <path> tem um atributo "data-municipio" que
      será usado como CHAVE ÚNICA para salvar o estado. Usei o
      código IBGE real de cada município para já deixarmos isso
      compatível com o mapa oficial no futuro.
    -->
    <svg id="mapa-rj" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
      <!-- Niterói -->
      <path id="mun-3303302"
            data-municipio="3303302"
            data-nome="Niterói"
            class="municipio"
            d="M 220 120 L 280 120 L 280 170 L 220 170 Z" />

      <!-- Rio de Janeiro (capital) -->
      <path id="mun-3304557"
            data-municipio="3304557"
            data-nome="Rio de Janeiro"
            class="municipio"
            d="M 130 140 L 210 140 L 210 220 L 130 220 Z" />

      <!-- São Gonçalo -->
      <path id="mun-3304904"
            data-municipio="3304904"
            data-nome="São Gonçalo"
            class="municipio"
            d="M 220 70 L 300 70 L 300 115 L 220 115 Z" />
    </svg>
  </main>

  <section id="detalhes" class="oculto">
    <h2 id="detalhes-nome"></h2>
    <p id="detalhes-status"></p>
    <p id="detalhes-data"></p>
    <button id="btn-reset-um">Desmarcar este município</button>
  </section>

  <footer>
    <button id="btn-reset-tudo">Resetar mapa inteiro</button>
  </footer>

  <script src="js/scratch-card.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
